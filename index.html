<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Temperature OTF</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    @font-face {
      font-family: tempu;
      src: url(TempuratureVF.ttf);
    }

    body {
      -webkit-font-smoothing: antialiased;
    }

    .none { display: none; }

    .meta {
      font-size: 13px;
      position: fixed;
      top: 1rem;
      left: 1rem;
      color: #666;
      display: flex;
      gap: 1.5rem;
      align-items: center;
      z-index: 10;
    }

    .weather-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 99px;
      border: 0.5px solid rgba(0,0,0,0.15);
      font-size: 12px;
      color: #666;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(4px);
    }

    .temp-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #378ADD;
      transition: background 0.8s ease;
    }

    .headline-wrap {
      width: 100vw;
      height: 100vh;
      left: 0;
      top: 0;
      overflow: hidden;
      position: fixed;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: -1;
    }

    .headline {
      font-family: 'tempu', serif;
      white-space: nowrap;
      display: block;
      line-height: 1;
      text-align: center;
      width: 100vw;
      transform: translateY(30px);
      color: #111;
      letter-spacing: -0.02em;
      transition: font-variation-settings 0.8s ease;
    }

    .axis-bar {
      position: fixed;
      width: 500px;
      max-width: calc(100vw - 20px);
      bottom: 10px;
      left: 10px;
      background-color: beige;
      padding: 1.25rem 1.5rem;
      border: 0.5px solid rgba(0,0,0,0.12);
      border-radius: 12px;
      z-index: 10;
    }

    .axis-label {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 0.5rem;
    }

    .status-msg {
      font-size: 11px;
      color: #aaa;
      min-height: 16px;
      margin-bottom: 0.75rem;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 0.5px solid rgba(0,0,0,0.1);
    }

    .slider-label { font-size: 12px; color: #666; white-space: nowrap; }
    #temp-slider { flex: 1; }
    .temp-display { font-size: 14px; font-weight: 500; color: #111; min-width: 50px; text-align: right; }

    .desc {
      margin-top: 0.75rem;
      font-size: 12px;
      color: #888;
      line-height: 1.5;
    }

    .text-input-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 0.5px solid rgba(0,0,0,0.1);
    }

    .text-input-label {
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #aaa;
      white-space: nowrap;
    }

    .text-input-field {
      flex: 1;
      font-family: 'tempu', serif;
      font-size: 14px;
      padding: 6px 10px;
      border: 0.5px solid rgba(0,0,0,0.2);
      border-radius: 6px;
      background: rgba(255,255,255,0.6);
      color: #111;
      outline: none;
      transition: font-variation-settings 0.8s ease, border-color 0.2s;
    }

    .text-input-field:focus {
      border-color: rgba(0,0,0,0.4);
    }

    .custom-wrap {
      width: 100%;
      overflow: hidden;
      line-height: 1;
      min-height: 1rem;
      margin-top: 0.5rem;
    }

    .custom-display {
      font-family: 'tempu', serif;
      white-space: nowrap;
      display: block;
      line-height: 1.1;
      color: #111;
      letter-spacing: -0.02em;
      transition: font-variation-settings 0.8s ease;
    }
  </style>
</head>
<body>

  <div class="meta">
    <div class="weather-pill">
      <div class="temp-dot" id="temp-dot"></div>
      <span id="location-label">Locating…</span>
    </div>
    <span class="temp-display" id="meta-temp">—</span>
    <span style="font-size:12px;color:#aaa;">wght <span id="wght-value">—</span></span>
  </div>

  <div class="headline-wrap" id="headline-wrap">
    <span class="headline" id="headline">T</span>
  </div>

  <div class="axis-bar">
    <div class="axis-label">Temperature OTF</div>
    <div class="status-msg" id="status-msg">Requesting location…</div>

    <div class="slider-row">
      <span class="slider-label">Override temperature</span>
      <input type="range" id="temp-slider" min="0" max="40" step="1" value="12">
      <span class="temp-display" id="slider-temp-display">12°C</span>
    </div>

    <p class="desc">Outside, the air sits at <strong id="temp-inline">—</strong>. That temperature is mapped directly to this font's weight axis — cold air makes letters lean thin, warmth rounds them into weight.</p>

    <div class="text-input-row">
      <span class="text-input-label">Your text</span>
      <input class="text-input-field" id="custom-input" type="text" placeholder="Type something…" maxlength="80" />
    </div>

    <div class="custom-wrap" id="custom-wrap">
      <span class="custom-display" id="custom-display" style="opacity:0; font-size:1rem;"></span>
    </div>
  </div>

  <script>
    const TEMP_MIN = 0, TEMP_MAX = 40;
    const WGHT_MIN = 100, WGHT_MAX = 900;
    const COLORS = { cold:'#85B7EB', cool:'#378ADD', mild:'#1D9E75', warm:'#EF9F27', hot:'#D85A30' };

    let currentWeight = 300;

    function tempToWeight(t) {
      const r = (Math.max(TEMP_MIN, Math.min(TEMP_MAX, t)) - TEMP_MIN) / (TEMP_MAX - TEMP_MIN);
      return Math.round(WGHT_MIN + r * (WGHT_MAX - WGHT_MIN));
    }

    function tempToColor(t) {
      if (t < 0)  return COLORS.cold;
      if (t < 10) return COLORS.cool;
      if (t < 20) return COLORS.mild;
      if (t < 30) return COLORS.warm;
      return COLORS.hot;
    }

    function fitEl(wrapId, elId, wght) {
      const wrap = document.getElementById(wrapId);
      const el   = document.getElementById(elId);
      el.style.fontVariationSettings = `'wght' ${wght}`;
      el.style.fontSize = '100px';
      const availW = wrap.clientWidth;
      if (!availW || !el.textContent.trim()) return;
      const naturalW = el.scrollWidth;
      el.style.fontSize = Math.floor(100 * (availW / naturalW)) + 'px';
    }

    function applyTemp(t) {
      const wght  = tempToWeight(t);
      const color = tempToColor(t);
      currentWeight = wght;

      const fvs = `'wght' ${wght}`;
      document.getElementById('temp-dot').style.background         = color;
      document.getElementById('wght-value').textContent            = wght;
      document.getElementById('meta-temp').textContent             = t.toFixed(1) + '°C';
      document.getElementById('slider-temp-display').textContent   = t.toFixed(1) + '°C';
      document.getElementById('temp-inline').textContent           = t.toFixed(1) + '°C';
      document.getElementById('temp-slider').value                 = Math.round(t);
      document.getElementById('custom-input').style.fontVariationSettings = fvs;

      fitEl('headline-wrap', 'headline', wght);

      const customEl = document.getElementById('custom-display');
      if (customEl.textContent.trim()) {
        customEl.style.opacity = '1';
        fitEl('custom-wrap', 'custom-display', wght);
      }
    }

    function setStatus(msg) {
      document.getElementById('status-msg').textContent = msg;
    }

    async function fetchWeather(lat, lon) {
      const url  = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`;
      const res  = await fetch(url);
      const data = await res.json();
      return data.current_weather.temperature;
    }

    async function reverseGeocode(lat, lon) {
      // try Nominatim first
      try {
        const res  = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
        const data = await res.json();
        const city = data.address.city || data.address.town || data.address.village || data.address.county || '';
        const cc   = data.address.country_code ? data.address.country_code.toUpperCase() : '';
        if (city) return `${city}, ${cc}`;
      } catch (_) {}
      // fallback: ip-api for city name (doesn't need coords)
      try {
        const res  = await fetch('https://ip-api.com/json/');
        const data = await res.json();
        if (data.city) return `${data.city}, ${data.countryCode}`;
      } catch (_) {}
      // last resort: raw coords
      return `${lat.toFixed(2)}, ${lon.toFixed(2)}`;
    }

    async function initLocation() {
      if (!navigator.geolocation) {
        setStatus('Geolocation not supported — drag slider to set temperature.');
        document.getElementById('location-label').textContent = 'Unknown location';
        applyTemp(12);
        return;
      }

      navigator.geolocation.getCurrentPosition(
        async (pos) => {
          const { latitude: lat, longitude: lon } = pos.coords;
          setStatus('Fetching temperature…');
          try {
            const [temp, place] = await Promise.all([
              fetchWeather(lat, lon),
              reverseGeocode(lat, lon)
            ]);
            document.getElementById('location-label').textContent = place;
            setStatus('Live · Open-Meteo');
            applyTemp(temp);
          } catch (e) {
            setStatus('Weather fetch failed — drag slider to set temperature.');
            document.getElementById('location-label').textContent = 'Unknown location';
            applyTemp(12);
          }
        },
        (err) => {
          const msgs = {
            1: 'Location denied — drag slider to set temperature.',
            2: 'Location unavailable — drag slider to set temperature.',
            3: 'Location timed out — drag slider to set temperature.',
          };
          setStatus(msgs[err.code] || 'Location error.');
          document.getElementById('location-label').textContent = 'Unknown location';
          applyTemp(12);
        },
        { timeout: 10000 }
      );
    }

    document.getElementById('temp-slider').addEventListener('input', function () {
      setStatus('Manual override');
      applyTemp(parseFloat(this.value));
    });

    document.getElementById('custom-input').addEventListener('input', function () {
      const el = document.getElementById('custom-display');
      if (this.value.trim()) {
        el.textContent   = this.value;
        el.style.opacity = '1';
        fitEl('custom-wrap', 'custom-display', currentWeight);
      } else {
        el.textContent    = '';
        el.style.opacity  = '0';
        el.style.fontSize = '1rem';
      }
    });

    const ro = new ResizeObserver(() => {
      applyTemp(parseFloat(document.getElementById('temp-slider').value));
    });
    ro.observe(document.getElementById('headline-wrap'));

    document.fonts.ready.then(() => initLocation());
  </script>

</body>
</html>
