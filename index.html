
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Temperature OTF</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,100..900&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }

    @font-face {
      font-family: tempu;
      src: url(TempuratureVF.ttf);
    }

    html, body {
      height: 100%;
      font-family: helvetica;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      background-color:gray;
    }

    .none { display: none; }

    .meta {
      font-size: 13px;
      position: fixed;
      top: max(1rem, env(safe-area-inset-top));
      left: 1rem;
      
      display: flex;
      gap: 1rem;
      align-items: center;
      z-index: 10;
    }

    .weather-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 99px;
      
      font-size: 12px;
      
      
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .temp-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #378ADD;
      transition: background 0.8s ease;
      flex-shrink: 0;
    }

    .headline-wrap {
      width: 100vw;
      height: 100dvh;
      left: 0; top: 0;
      overflow: hidden;
      line-height: 1;
      pointer-events:none;
      display: flex;
      z-index: 0;
      position: fixed;
      justify-content: center;
      align-items: center;
    }

    .headline {
      font-family: 'tempu', serif;
      white-space: nowrap;
      display: block;
      line-height: 1;
      text-align: center;
      width: 100vw;
      font-size:75vw;
      transform: translateY(30px);
      color:pink;
      letter-spacing: -0.02em;
      transition: font-variation-settings 0.8s ease;
    }

    .axis-bar {
      position: fixed;
      width: calc(100vw - 20px);
      max-width: 500px;
      bottom: max(10px, env(safe-area-inset-bottom));
      left: 10px;
      
      padding: 1rem 1.25rem;
      border: 0.5px solid rgba(0,0,0,0.1);
      border-radius: 16px;
      z-index: 10;
    }

    .axis-label {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      
      margin-bottom: 0.4rem;
    }

    .status-msg {
      font-size: 11px;
      
      min-height: 15px;
      margin-bottom: 0.6rem;
      line-height: 1.4;
    }

    .locate-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 13px;
      font-size: 12px;
      
      background: white;
      border: 0.5px solid rgba(0,0,0,0.18);
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 0.85rem;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .locate-btn:active { background: #f0f0f0; }
    .locate-btn:disabled { opacity: 0.5; }

    .axis-track {
      position: relative;
      height: 4px;
      background: rgba(0,0,0,0.1);
      border-radius: 2px;
      margin-bottom: 0.5rem;
      display: none;
    }

    .axis-fill {
      height: 100%;
      border-radius: 2px;
      background: #378ADD;
      transition: width 0.8s ease, background 0.8s ease;
    }

    .axis-thumb {
      position: absolute;
      top: 50%;
      display: none;
      transform: translate(-50%, -50%);
      width: 14px; height: 14px;
      border-radius: 50%;
      background: black;
      border: 2px solid white;
      transition: left 0.8s ease, background 0.8s ease;
    }

    #temp-slider {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      height: 3px;
      background: #d3d3d3;
      outline: none;
      border-radius: 2px;
      opacity: 0.7;
    }

    #temp-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #333;
      cursor: pointer;
    }

    #temp-slider::-moz-range-thumb {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #333;
      cursor: pointer;
      border: none;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-top: 0.85rem;
      border-top: 0.5px solid rgba(0,0,0,0.1);
    }

    .slider-label { font-size: 12px; color: #000; white-space: nowrap; }
    .temp-display { font-size: 14px; font-weight: 500; color: #000; min-width: 46px; text-align: right; }

    .desc {
      margin-top: 0.65rem;
      font-size: 12px;
      color: #000;
      line-height: 1.5;
    }

    .text-input-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 0.65rem;
      padding-top: 0.65rem;
      border-top: 0.5px solid rgba(0,0,0,0.1);
    }

    .text-input-label {
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      
      white-space: nowrap;
    }

    .text-input-field {
      flex: 1;
      font-family: 'tempu', serif;
      /* 16px prevents iOS auto-zoom on focus */
      font-size: 16px;
      padding: 6px 10px;
      border: 0.5px solid rgba(0,0,0,0.15);
      border-radius: 6px;
      background: rgba(255,255,255,0.6);
      color: #000;
      outline: none;
      transition: font-variation-settings 0.8s ease, border-color 0.2s;
    }
    .text-input-field:focus { border-color: rgba(0,0,0,0.35); }

    .custom-wrap {
      width: 100%;
      overflow: hidden;
      line-height: 1;
      min-height: 1rem;
      margin-top: 0.4rem;
    }

    .custom-display {
      font-family: 'tempu', serif;
      white-space: nowrap;
      display: block;
      line-height: 1.1;
      color: #000;
      letter-spacing: -0.02em;
      transition: font-variation-settings 0.8s ease;
    }

@media only screen and (max-width: 600px) {
    .headline {
    font-size: calc(100vw / .7) !important;
  
  }
  .axis-bar {
    position: fixed;
    width: calc(100% - 20px);
    bottom: 10px;
    left: 10px;
    
    padding: 1.25rem 1.5rem;
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    z-index: 10;
  }

  .headline-wrap {
    width: 100vw;
    height: 80vh;
    left: 0px;
    top: 0px;
    overflow: hidden;
    line-height: 1;
    margin-bottom: 1.5rem;
    
    
    display: flex;
    z-index: -9;
    position: fixed;
    justify-content: center;
    align-items: center;
  }


}

    
  </style>
</head>
<body>

  <div class="meta">
    <div class="weather-pill">
      <div class="temp-dot" id="temp-dot"></div>
      <span id="location-label">—</span>
    </div>
    <span class="temp-display" id="slider-temp-display">—</span>
    Current:<span style="font-size:12px;color:#000 !important;">wght <span id="wght-value">—</span></span>
  </div>

  <div class="headline-wrap" id="headline-wrap">
    <span class="headline" id="headline">TE</span>
  </div>

  <div class="axis-bar">
    <div class="axis-label">Temperature OTF</div>
    <div class="status-msg" id="status-msg"></div>

    <button class="locate-btn" id="locate-btn" onclick="requestLocation()">
      Use my location
    </button>

    <div class="axis-track">
      <div class="axis-fill" id="axis-fill"></div>
      <div class="axis-thumb" id="axis-thumb"></div>
    </div>

    <div class="slider-row">
      <span class="slider-label">Override</span>
      <input type="range" id="temp-slider" min="0" max="30" step="1" value="12">
      <span class="temp-display" id="slider-temp-display2">12°C</span>
    </div>

    <p class="desc">Outside, the air sits at <strong id="temp-inline">—</strong>. </p>

    <div class="text-input-row">
      <span class="text-input-label">Your text</span>
      <input
        class="text-input-field"
        id="custom-input"
        type="text"
        placeholder="Type something…"
        maxlength="80"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
      />
    </div>

    <div class="custom-wrap" id="custom-wrap">
      <span class="custom-display" id="custom-display" style="opacity:0; font-size:1rem;"></span>
    </div>
  </div>

  <script>
    const TEMP_MIN = 0, TEMP_MAX = 30;
    const WGHT_MIN = 100, WGHT_MAX = 900;
    const COLORS = { cold:'#85B7EB', cool:'#378ADD', mild:'#1D9E75', warm:'#EF9F27', hot:'#D85A30' };

    let currentWeight = 300;

    function tempToWeight(t) {
      const r = (Math.max(TEMP_MIN, Math.min(TEMP_MAX, t)) - TEMP_MIN) / (TEMP_MAX - TEMP_MIN);
      return Math.round(WGHT_MIN + r * (WGHT_MAX - WGHT_MIN));
    }

    function tempToColor(t) {
      if (t < 0)  return COLORS.cold;
      if (t < 10) return COLORS.cool;
      if (t < 20) return COLORS.mild;
      if (t < 30) return COLORS.warm;
      return COLORS.hot;
    }

    function fitEl(wrapId, elId, wght) {
      const wrap = document.getElementById(wrapId);
      const el   = document.getElementById(elId);
      el.style.fontVariationSettings = `'wght' ${wght}`;
      el.style.fontSize = '600px';
      const availW = wrap.clientWidth;
      if (!availW || !el.textContent.trim()) return;
      el.style.fontSize = Math.floor(100 * (availW / el.scrollWidth)) + 'px';
    }

    function applyTemp(t) {
      const wght  = tempToWeight(t);
      const color = tempToColor(t);
      currentWeight = wght;
      const fvs = `'wght' ${wght}`;

      document.getElementById('temp-dot').style.background        = color;
      document.getElementById('wght-value').textContent           = wght;
      document.getElementById('slider-temp-display').textContent  = t.toFixed(1) + '°C';
      document.getElementById('slider-temp-display2').textContent = t.toFixed(1) + '°C';
      document.getElementById('temp-inline').textContent          = t.toFixed(1) + '°C';
      document.getElementById('temp-slider').value                = Math.round(t);
      document.getElementById('custom-input').style.fontVariationSettings = fvs;

      fitEl('headline-wrap', 'headline', wght);

      const customEl = document.getElementById('custom-display');
      if (customEl.textContent.trim()) {
        customEl.style.opacity = '1';
        fitEl('custom-wrap', 'custom-display', wght);
      }
    }

    function setStatus(msg) {
      document.getElementById('status-msg').textContent = msg;
    }

    async function fetchWeather(lat, lon) {
      const res  = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
      const data = await res.json();
      return data.current_weather.temperature;
    }

    async function reverseGeocode(lat, lon) {
      try {
        const res  = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
        const data = await res.json();
        const city = data.address.city || data.address.town || data.address.village || data.address.county || '';
        const cc   = data.address.country_code ? data.address.country_code.toUpperCase() : '';
        if (city) return `${city}, ${cc}`;
      } catch (_) {}
      try {
        const res  = await fetch('https://ip-api.com/json/');
        const data = await res.json();
        if (data.city) return `${data.city}, ${data.countryCode}`;
      } catch (_) {}
      return `${lat.toFixed(2)}, ${lon.toFixed(2)}`;
    }

    async function requestLocation() {
      const btn = document.getElementById('locate-btn');
      btn.disabled = true;
      btn.textContent = '◎ Locating…';

      if (!navigator.geolocation) {
        setStatus('Geolocation not supported — use the slider.');
        btn.disabled = false;
        btn.textContent = '◎ Use my location';
        return;
      }

      setStatus('Waiting for permission…');

      navigator.geolocation.getCurrentPosition(
        async (pos) => {
          const { latitude: lat, longitude: lon } = pos.coords;
          setStatus('Fetching temperature…');
          try {
            const [temp, place] = await Promise.all([
              fetchWeather(lat, lon),
              reverseGeocode(lat, lon)
            ]);
            document.getElementById('location-label').textContent = place;
            setStatus('Live · Open-Meteo');
            btn.textContent = '◎ ' + place;
            applyTemp(temp);
          } catch (e) {
            setStatus('Weather fetch failed — use the slider.');
            btn.disabled = false;
            btn.textContent = '◎ Try again';
          }
        },
        (err) => {
          const msgs = {
            1: 'Permission denied — allow location in Settings and try again.',
            2: 'Location unavailable — use the slider.',
            3: 'Request timed out — try again.',
          };
          setStatus(msgs[err.code] || 'Location error — use the slider.');
          btn.disabled = false;
          btn.textContent = '◎ Try again';
        },
        { timeout: 10000, maximumAge: 60000 }
      );
    }

    document.getElementById('temp-slider').addEventListener('input', function () {
      setStatus('Manual override');
      applyTemp(parseFloat(this.value));
    });

    document.getElementById('custom-input').addEventListener('input', function () {
      const el = document.getElementById('custom-display');
      if (this.value.trim()) {
        el.textContent   = this.value;
        el.style.opacity = '1';
        fitEl('custom-wrap', 'custom-display', currentWeight);
      } else {
        el.textContent    = '';
        el.style.opacity  = '0';
        el.style.fontSize = '1rem';
      }
    });

    /* re-fit on resize + iOS keyboard show/hide via visualViewport */
    const ro = new ResizeObserver(() => {
      applyTemp(parseFloat(document.getElementById('temp-slider').value));
    });
    ro.observe(document.getElementById('headline-wrap'));

    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', () => {
        applyTemp(parseFloat(document.getElementById('temp-slider').value));
      });
    }

    document.fonts.ready.then(() => applyTemp(12));
  </script>

</body>
</html>
