<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Temperature OTF</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    @font-face {
      font-family: tempu;
      src: url(TempuratureVF.ttf);
    }
    .page {
    padding: 2rem 1.5rem 3rem;
    font-family: arial;
    -webkit-font-smoothing: antialiased;
  }

  .none { display: none; }

  .meta {
    font-size: 13px;
    position: fixed;
    top: 1rem;
    left: 1rem;
    color: var(--color-text-secondary);
    margin-bottom: 2rem;
    display: flex;
    gap: 1.5rem;
    align-items: center;
    z-index: 10;
  }

  .weather-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 99px;
    border: 0.5px solid var(--color-border-tertiary);
    font-size: 12px;
    color: var(--color-text-secondary);
    background: var(--color-background-secondary);
  }

  .temp-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #378ADD;
    transition: background 0.8s ease;
  }

  .headline-wrap {
    width: 100vw;
    height: 100vh;
    left: 0px;
    top: 0px;
    overflow: hidden;
    line-height: 1;
    margin-bottom: 1.5rem;
    background: var(--color-background-secondary);
    display: flex;
    z-index: -9;
    position: fixed;
    justify-content: center;
    align-items: center;
  }

  .headline {
    font-family: 'tempu', serif;
    white-space: nowrap;
    display: block;
    line-height: 1;
    font-size: calc(100vw / 2) !important;
    text-align: center;
    width: 100vw;
    transform: translateY(30px);
    color: var(--color-text-primary);
    letter-spacing: -0.02em;
    transition: font-variation-settings 0.8s ease;
  }

  .body-text {
    font-family: 'courier', serif;
    font-size: clamp(1rem, 2.5vw, 1.2rem);
    line-height: 1.65;
    color: var(--color-text-secondary);
    max-width: 540px;
    transition: font-variation-settings 0.8s ease;
  }

  .axis-bar {
    position: fixed;
    width: 500px;
    bottom: 10px;
    left: 10px;
    background-color: rgb(233, 233, 233);
    padding: 1.25rem 1.5rem;
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    z-index: 10;
  }

  .axis-label {
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--color-text-tertiary);
    margin-bottom: 0.75rem;
  }

  .axis-track {
    position: relative;
    height: 4px;
    background: var(--color-border-tertiary);
    border-radius: 2px;
    margin-bottom: 0.5rem;
    display: none;
  }

  .axis-fill {
    height: 100%;
    border-radius: 2px;
    background: #378ADD;
    transition: width 0.8s ease, background 0.8s ease;
  }

  .axis-thumb {
    position: absolute;
    top: 50%;
    display: none;
    transform: translate(-50%, -50%);
    width: 14px; height: 14px;
    border-radius: 50%;
    background: black;
    border: 2px solid var(--color-background-primary);
    transition: left 0.8s ease, background 0.8s ease;
  }

  #temp-slider{
    -webkit-appearance: none;  /* Override default CSS styles */
  appearance: none;
  width: 100%; /* Full-width */
  height: 3px; /* Specified height */
  background: #d3d3d3; /* Grey background */
  outline: none; /* Remove outline */
  opacity: 0.7; /* Set transparency (for mouse-over effects on hover) */
  -webkit-transition: .2s; /* 0.2 seconds transition on hover */
  transition: opacity .2s;
  }

  .slider::-moz-range-thumb {
  width: 25px; /* Set a specific slider handle width */
  height: 25px; /* Slider handle height */
  background: #04AA6D; /* Green background */
  cursor: pointer; /* Cursor on hover */
}

  .slider-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 1.25rem;
    padding-top: 1rem;
  }

  .slider-label { font-size: 12px; color: var(--color-text-secondary); white-space: nowrap; }
  #temp-slider { flex: 1; }
  .temp-display { font-size: 14px; font-weight: 500; color: var(--color-text-primary); min-width: 50px; text-align: right; }
  .axis-info { margin-top: 0.75rem; font-size: 12px; color: var(--color-text-tertiary); }
  .axis-info span { color: var(--color-text-primary); font-weight: 500; }

  .status-msg {
    font-size: 11px;
    color: var(--color-text-tertiary);
    margin-bottom: 0.5rem;
    min-height: 16px;
  }

  .custom-wrap {
    width: 100%;
    overflow: hidden;
    line-height: 1;
  }

  .custom-display {
    font-family: 'tempu', serif;
    white-space: nowrap;
    display: block;
    line-height: 1.1;
    color: var(--color-text-primary);
    letter-spacing: -0.02em;
    transition: font-variation-settings 0.8s ease;
  }

  .text-input-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 0.75rem;
    padding-top: 0.75rem;
    border-top: 0.5px solid var(--color-border-tertiary);
  }

  .text-input-label {
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--color-text-tertiary);
    white-space: nowrap;
    display: hide;
  }

  .text-input-field {
    flex: 1;
    display: none;
    font-family: 'tempu', serif;
    font-size: 14px;
    padding: 6px 10px;
    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--border-radius-md);
    background: transparent;
    color: var(--color-text-primary);
    outline: none;
    transition: font-variation-settings 0.8s ease, border-color 0.2s;
  }

  .text-input-field:focus {
    border-color: var(--color-border-primary);
  }
  </style>
</head>
<body>

  <div class="meta">
    <div class="weather-pill">
      <div class="temp-dot" id="temp-dot"></div>
      <span id="location-label">—</span>
    </div>
    <span class="temp-display" id="meta-temp">—</span>
    <span style="font-size:12px;color:#aaa;">wght <span id="wght-value">—</span></span>
  </div>

  <div class="headline-wrap" id="headline-wrap">
    <span class="headline" id="headline">T</span>
  </div>

  <div class="axis-bar">
    <div class="axis-label">Temperature OTF</div>
    <div class="status-msg" id="status-msg">Use your live temperature or drag the slider.</div>

    <button class="locate-btn" id="locate-btn" onclick="requestLocation()">
      ◎ Use my location
    </button>

    <div class="slider-row">
      <span class="slider-label">Manual temperature</span>
      <input type="range" id="temp-slider" min="0" max="40" step="1" value="12">
      <span class="temp-display" id="slider-temp-display">12°C</span>
    </div>

    <p class="desc">Outside, the air sits at <strong id="temp-inline">12°C</strong>. That temperature is mapped directly to this font's weight axis — cold air makes letters lean thin, warmth rounds them into weight.</p>

    <div class="text-input-row">
      <span class="text-input-label">Your text</span>
      <input class="text-input-field" id="custom-input" type="text" placeholder="Type something…" maxlength="80" />
    </div>

    <div class="custom-wrap" id="custom-wrap">
      <span class="custom-display" id="custom-display" style="opacity:0; font-size:1rem;"></span>
    </div>
  </div>

  <script>
    const TEMP_MIN = 0, TEMP_MAX = 40;
    const WGHT_MIN = 100, WGHT_MAX = 900;
    const COLORS = { cold:'#85B7EB', cool:'#378ADD', mild:'#1D9E75', warm:'#EF9F27', hot:'#D85A30' };

    let currentWeight = 300;

    function tempToWeight(t) {
      const r = (Math.max(TEMP_MIN, Math.min(TEMP_MAX, t)) - TEMP_MIN) / (TEMP_MAX - TEMP_MIN);
      return Math.round(WGHT_MIN + r * (WGHT_MAX - WGHT_MIN));
    }

    function tempToColor(t) {
      if (t < 0)  return COLORS.cold;
      if (t < 10) return COLORS.cool;
      if (t < 20) return COLORS.mild;
      if (t < 30) return COLORS.warm;
      return COLORS.hot;
    }

    function fitEl(wrapId, elId, wght) {
      const wrap = document.getElementById(wrapId);
      const el   = document.getElementById(elId);
      el.style.fontVariationSettings = `'wght' ${wght}`;
      el.style.fontSize = '100px';
      const availW = wrap.clientWidth;
      if (!availW || !el.textContent.trim()) return;
      el.style.fontSize = Math.floor(100 * (availW / el.scrollWidth)) + 'px';
    }

    function applyTemp(t) {
      const wght  = tempToWeight(t);
      const color = tempToColor(t);
      currentWeight = wght;
      const fvs = `'wght' ${wght}`;

      document.getElementById('temp-dot').style.background       = color;
      document.getElementById('wght-value').textContent          = wght;
      document.getElementById('meta-temp').textContent           = t.toFixed(1) + '°C';
      document.getElementById('slider-temp-display').textContent = t.toFixed(1) + '°C';
      document.getElementById('temp-inline').textContent         = t.toFixed(1) + '°C';
      document.getElementById('temp-slider').value               = Math.round(t);
      document.getElementById('custom-input').style.fontVariationSettings = fvs;

      fitEl('headline-wrap', 'headline', wght);

      const customEl = document.getElementById('custom-display');
      if (customEl.textContent.trim()) {
        customEl.style.opacity = '1';
        fitEl('custom-wrap', 'custom-display', wght);
      }
    }

    function setStatus(msg) {
      document.getElementById('status-msg').textContent = msg;
    }

    async function fetchWeather(lat, lon) {
      const res  = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
      const data = await res.json();
      return data.current_weather.temperature;
    }

    async function reverseGeocode(lat, lon) {
      try {
        const res  = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
        const data = await res.json();
        const city = data.address.city || data.address.town || data.address.village || data.address.county || '';
        const cc   = data.address.country_code ? data.address.country_code.toUpperCase() : '';
        if (city) return `${city}, ${cc}`;
      } catch (_) {}
      try {
        const res  = await fetch('https://ip-api.com/json/');
        const data = await res.json();
        if (data.city) return `${data.city}, ${data.countryCode}`;
      } catch (_) {}
      return `${lat.toFixed(2)}, ${lon.toFixed(2)}`;
    }

    async function requestLocation() {
      const btn = document.getElementById('locate-btn');
      btn.disabled = true;
      btn.textContent = '◎ Locating…';

      if (!navigator.geolocation) {
        setStatus('Geolocation not supported by this browser.');
        btn.disabled = false;
        btn.textContent = '◎ Use my location';
        return;
      }

      setStatus('Waiting for location permission…');

      navigator.geolocation.getCurrentPosition(
        async (pos) => {
          const { latitude: lat, longitude: lon } = pos.coords;
          setStatus('Got location. Fetching temperature…');
          try {
            const [temp, place] = await Promise.all([
              fetchWeather(lat, lon),
              reverseGeocode(lat, lon)
            ]);
            document.getElementById('location-label').textContent = place;
            setStatus('Live · Open-Meteo');
            btn.textContent = '◎ ' + place;
            applyTemp(temp);
          } catch (e) {
            setStatus('Could not fetch weather. Try the slider.');
            btn.disabled = false;
            btn.textContent = '◎ Try again';
          }
        },
        (err) => {
          const msgs = {
            1: 'Location permission denied. Allow it in your browser settings and try again.',
            2: 'Location unavailable. Try the slider.',
            3: 'Location request timed out. Try again.',
          };
          setStatus(msgs[err.code] || 'Location error. Try the slider.');
          btn.disabled = false;
          btn.textContent = '◎ Try again';
        },
        { timeout: 10000, maximumAge: 60000 }
      );
    }

    document.getElementById('temp-slider').addEventListener('input', function () {
      setStatus('Manual override');
      applyTemp(parseFloat(this.value));
    });

    document.getElementById('custom-input').addEventListener('input', function () {
      const el = document.getElementById('custom-display');
      if (this.value.trim()) {
        el.textContent   = this.value;
        el.style.opacity = '1';
        fitEl('custom-wrap', 'custom-display', currentWeight);
      } else {
        el.textContent    = '';
        el.style.opacity  = '0';
        el.style.fontSize = '1rem';
      }
    });

    const ro = new ResizeObserver(() => {
      applyTemp(parseFloat(document.getElementById('temp-slider').value));
    });
    ro.observe(document.getElementById('headline-wrap'));

    document.fonts.ready.then(() => applyTemp(12));
  </script>

</body>
</html>
